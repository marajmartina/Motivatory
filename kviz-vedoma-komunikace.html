<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvíz: Vědomá komunikace</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
.wrap { max-width: 680px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; line-height: 1.5; }
.progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-bottom: 4px; }
.progress-fill { height: 4px; background: #0F6E56; border-radius: 2px; transition: width 0.4s; }
.progress-label { font-size: 12px; color: #888; margin-bottom: 1.25rem; }
.card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
.q-num { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.q-tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #E1F5EE; color: #0F6E56; margin-bottom: 10px; }
.q-text { font-size: 15px; line-height: 1.65; margin-bottom: 1.25rem; color: #1a1a1a; }
.options { display: flex; flex-direction: column; gap: 8px; }
.opt { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 14px; color: #1a1a1a; line-height: 1.5; transition: background 0.15s, border-color 0.15s; width: 100%; }
.opt:hover:not([disabled]) { background: #f5f5f3; border-color: #bbb; }
.opt-letter { font-size: 12px; font-weight: 600; color: #999; min-width: 16px; margin-top: 2px; flex-shrink: 0; }
.opt.correct { background: #E1F5EE; border-color: #1D9E75; }
.opt.correct .opt-letter { color: #0F6E56; }
.opt.wrong { background: #FCEBEB; border-color: #E24B4A; }
.opt.wrong .opt-letter { color: #A32D2D; }
.feedback { margin-top: 12px; font-size: 13px; line-height: 1.55; padding: 10px 14px; border-radius: 8px; }
.feedback.ok { background: #E1F5EE; color: #085041; }
.feedback.err { background: #FCEBEB; color: #791F1F; }
.nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
.btn { padding: 9px 20px; font-size: 14px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; color: #1a1a1a; }
.btn:hover { background: #f5f5f3; }
.btn.primary { background: #0F6E56; color: #fff; border-color: #0F6E56; }
.btn.primary:hover { background: #085041; }
.btn[disabled] { opacity: 0.35; cursor: default; }
.page-label { font-size: 13px; color: #888; }
.result { text-align: center; }
.result-score { font-size: 56px; font-weight: 600; color: #0F6E56; line-height: 1; }
.result-sub { font-size: 14px; color: #888; margin-top: 4px; }
.result-msg { font-size: 15px; color: #1a1a1a; margin: 1.25rem 0; line-height: 1.6; }
.bars { text-align: left; margin-top: 1.25rem; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
.bar-label { min-width: 90px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 6px; background: #e0e0e0; border-radius: 3px; }
.bar-fill { height: 6px; border-radius: 3px; background: #1D9E75; }
.bar-fill.no { background: #E24B4A; }
.restart { margin-top: 1.5rem; padding: 10px 28px; font-size: 14px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; color: #1a1a1a; }
.restart:hover { background: #f5f5f3; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Kvíz: nástroje vědomé komunikace</h1>
  <p class="subtitle">Pracovní list | Zaškrtněte jednu odpověď, která nejlépe odpovídá pravidlům vědomé komunikace.</p>
  <div id="app"></div>
</div>
<script>
var Q = [
  {
    tag: "Pojmenování (labeling)",
    text: 'Kolega v emočně vypjaté situaci říká: "Šéf na mě strašně tlačí, termíny jsou nereálné a já už prostě nemůžu dál!" Která reakce správně demonstruje techniku POJMENOVÁNÍ (LABELING)?',
    opts: [
      "Zdá se, že se cítíte dost pod tlakem a situace vás vyčerpává.",
      "Takže říkáte, že ty termíny od šéfa jsou nastavené úplně nereálně?",
      "Chápu, rozumím, slyším vás.",
      "Co byste teď od šéfa nejvíc potřeboval, aby se vám ulevilo?"
    ],
    correct: 0,
    why: "Labeling pojmenovává emoci druhé strany bez hodnocení: Zdá se, že... Zrcadlení (b) opakuje obsah, ne emoci. Empatie (c) je příliš obecná. Otázka (d) přeskakuje k řešení."
  },
  {
    tag: "Zrcadlení (mirroring)",
    text: "Jaký je primární psychologický a neurologický dopad správně použitého ZRCADLENÍ v komunikaci?",
    opts: [
      "Uklidňuje emoce druhé strany a umožňuje jí přejít z emočního nastavení do logické části mozku.",
      "Okamžitě ukončuje diskuzi a vede k rychlému formálnímu uzavření etapy rozhovoru.",
      "Nutí druhou stranu obhajovat své postoje a vysvětlovat dřívější chyby.",
      "Přesouvá pozornost od toho, co člověk chce, k detailní analýze problému z minulosti."
    ],
    correct: 0,
    why: "Zrcadlení opakuje klíčová slova druhé strany a aktivuje pocit pochopení. Pomáhá přesunout rozhovor z amygdaly (emoce) do prefrontálního kortexu (logika)."
  },
  {
    tag: "Jazyk řešení",
    text: 'Podřízený si stěžuje: "Náš systém neustále padá, takhle se nedá pracovat, je to hrozný zmatek." Jak by měla vypadat manažerská reakce při uplatnění JAZYKA ŘEŠENÍ?',
    opts: [
      "Pojďme se podívat na to, co přesně potřebujeme k tomu, aby systém běžel stabilně.",
      "Systém prostě selhává, musíme okamžitě najít viníka těchto zmatků.",
      "Padá ten systém každý den?",
      "Chápu, že to vidíte jinak, ale s tím systémem teď nic neuděláme."
    ],
    correct: 0,
    why: "Jazyk řešení zaměřuje energii dopředu - na to, co potřebujeme, ne na problém nebo vinu. Otázka (c) je diagnostická, ne orientovaná na řešení."
  },
  {
    tag: "Model SI-DO-P-O",
    text: 'Při zpětné vazbě říkáte: "Když odevzdáš report po termínu, musím pak narychlo měnit podklady pro vedení a schůzka se posouvá." Které fáze modelu SI-DO-P-O vaše věta obsahuje?',
    opts: [
      "SITUACE (SI) a DOPADY (DO)",
      "POŽADAVEK (P) a OVĚŘENÍ (O)",
      "SITUACE (SI) a POŽADAVEK (P)",
      "DOPADY (DO) a OVĚŘENÍ (O)"
    ],
    correct: 0,
    why: "Když odevzdáš report po termínu = SITUACE. Musím měnit podklady a schůzka se posouvá = DOPADY. POŽADAVEK a OVĚŘENÍ ve větě chybí."
  },
  {
    tag: "Kalibrační otázka",
    text: "Která z otázek je ukázkovým příkladem KALIBRAČNÍ OTÁZKY, jejímž cílem je zapojit logické centrum druhé strany?",
    opts: [
      "Jak bych to měl podle tebe teď udělat?",
      "Rozumím tomu správně, že s tímto návrhem vůbec nesouhlasíš?",
      "Proč jsi ten úkol zase nestihl včas?",
      "Můžeš mi slíbit, že se to už nebude opakovat?"
    ],
    correct: 0,
    why: "Kalibrační otázka začíná Jak nebo Co - vyzývá k přemýšlení, ne k obraně. Proč (c) bývá vnímáno jako útok. Rozumím správně... (b) je parafráze, ne kalibrační otázka."
  },
  {
    tag: "Produktivní ticho",
    text: "Jaký je hlavní přínos PRODUKTIVNÍHO TICHA bezprostředně poté, co položíte důležitou otázku?",
    opts: [
      "Vede druhou stranu k hlubšímu přemýšlení a vám poskytuje čas pro přípravu vlastní reakce.",
      "Slouží jako nátlakový nástroj, který má druhou stranu zastrašit a donutit k ústupkům.",
      "Signalizuje, že s druhou stranou zásadně nesouhlasíte a odmítáte dále diskutovat.",
      "Používá se výhradně pro definitivní ukončení celé komunikační situace."
    ],
    correct: 0,
    why: "Ticho po otázce dává druhé straně prostor formulovat skutečnou odpověď a umožňuje sledovat neverbální reakce. Nikdy není nástrojem nátlaku."
  },
  {
    tag: "Technika",
    text: 'Zákazník rozčileně popisuje komplikaci s reklamací. Vy reagujete: "Takže to vypadá, že zboží nedorazilo v pořádku a vy teď potřebujete urgentní výměnu. Je to tak?" Jakou techniku jste použili?',
    opts: [
      "Parafráze",
      "Já jazyk",
      "Zrcadlení",
      "Kalibrační otázka"
    ],
    correct: 0,
    why: "Parafráze převádí obsah sdělení vlastními slovy a ověřuje pochopení otázkou Je to tak? Zrcadlení by opakovalo klíčová slova doslova."
  },
  {
    tag: "Model SI-DO-P-O",
    text: "Pokud postupujete chronologicky podle modelu SI-DO-P-O, co přesně vyjadřuje fáze označená písmenem P?",
    opts: [
      "Jasné formulování toho, co od druhé strany potřebujete do budoucna jinak.",
      "Výzva, aby vám druhá strana situaci shrnula vlastními slovy.",
      "Omluva za to, že situaci vůbec musíte otevírat a řešit.",
      "Dotaz na to, jak celou situaci vnímá partner ze své perspektivy."
    ],
    correct: 0,
    why: "P = POŽADAVEK: konkrétní, realizovatelná a pozitivně formulovaná žádost o změnu chování do budoucna."
  },
  {
    tag: "Já jazyk",
    text: "Který výrok je správně formulován v JÁ JAZYCE, aby nevyvolával zbytečnou defenzivu?",
    opts: [
      "Já navrhuji, abychom si nejdříve prošli fakta, protože vnímám, že v tom máme nejasnosti.",
      "Ty mě vůbec neposloucháš a pořád mi skáčeš do řeči.",
      "Musíte okamžitě změnit přístup, jinak ta schůzka nikam nepovede.",
      "Je všeobecně známo, že tento postup je úplně špatný."
    ],
    correct: 0,
    why: "Já jazyk mluví o vlastním vnímání a návrzích bez obvinění: Vnímám... navrhuji... Možnosti b-d obsahují obviňování, příkazy nebo apel na autoritu."
  },
  {
    tag: "Neutralizační věta + kalibrační otázka",
    text: "Druhá strana trvá na nerealizovatelném požadavku. Chcete zachovat bezpečné prostředí a zároveň vymezit hranice. Která reakce nejlépe kombinuje NEUTRALIZAČNÍ VĚTU a OTEVŘENOU/KALIBRAČNÍ OTÁZKU?",
    opts: [
      "Chápu, že to vidíte jinak. Jak bych to ale měl podle vás za těchto podmínek udělat?",
      "Tohle je naprosto nepřijatelné. Buď slevíte, nebo rovnou končíme.",
      "Děkuji, rozumím. Uděláme to přesně tak, jak říkáte.",
      "Můžete mi slíbit, že příště budete rozumnější?"
    ],
    correct: 0,
    why: "Neutralizační věta Chápu, že to vidíte jinak nehodnotí a nekapituluje. Kalibrační otázka Jak bych to měl...? přesouvá odpovědnost za řešení na druhou stranu."
  }
];

var letters = ['a','b','c','d'];
var cur = 0;
var answers = [];
var picks = [];
for (var i = 0; i < Q.length; i++) { answers.push(null); picks.push(null); }

function render() {
  var app = document.getElementById('app');
  if (cur >= Q.length) { renderResult(); return; }
  var q = Q[cur];
  var done = answers[cur] !== null;
  var pick = picks[cur];
  var answered = 0;
  for (var i = 0; i < answers.length; i++) { if (answers[i] !== null) answered++; }
  var pct = Math.round(answered / Q.length * 100);

  var optsHTML = '';
  for (var i = 0; i < q.opts.length; i++) {
    var cls = 'opt';
    if (done) {
      if (i === q.correct) cls += ' correct';
      else if (i === pick && pick !== q.correct) cls += ' wrong';
    }
    var dis = done ? 'disabled' : '';
    optsHTML += '<button class="' + cls + '" ' + dis + ' onclick="doPick(' + i + ')" style="width:100%">';
    optsHTML += '<span class="opt-letter">' + letters[i] + ')</span><span>' + q.opts[i] + '</span></button>';
  }

  var fb = '';
  if (done) {
    var ok = pick === q.correct;
    var fbcls = ok ? 'ok' : 'err';
    var prefix = ok ? '&#10003; Správně.' : '&#10007; Správná odpověď: ' + letters[q.correct] + ')';
    fb = '<div class="feedback ' + fbcls + '"><strong>' + prefix + '</strong> ' + q.why + '</div>';
  }

  var nextBtn = '';
  if (cur < Q.length - 1) {
    nextBtn = '<button class="btn primary" onclick="go(1)">Další &#8594;</button>';
  } else {
    nextBtn = '<button class="btn primary" onclick="showResult()">Výsledky &#8594;</button>';
  }

  var backDis = cur === 0 ? 'disabled' : '';

  app.innerHTML =
    '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="progress-label">' + answered + ' / ' + Q.length + ' otázek zodpovězeno</div>' +
    '<div class="card">' +
      '<div class="q-num">Otázka ' + (cur+1) + ' z ' + Q.length + '</div>' +
      '<div class="q-tag">' + q.tag + '</div>' +
      '<div class="q-text">' + q.text + '</div>' +
      '<div class="options">' + optsHTML + '</div>' +
      fb +
    '</div>' +
    '<div class="nav">' +
      '<button class="btn" onclick="go(-1)" ' + backDis + '>&#8592; Zpět</button>' +
      '<span class="page-label">' + (cur+1) + ' / ' + Q.length + '</span>' +
      nextBtn +
    '</div>';
}

function doPick(i) {
  if (answers[cur] !== null) return;
  picks[cur] = i;
  answers[cur] = (i === Q[cur].correct) ? 1 : 0;
  render();
}

function go(d) {
  cur = Math.max(0, Math.min(Q.length - 1, cur + d));
  render();
}

function showResult() { cur = Q.length; render(); }

function renderResult() {
  var score = 0;
  for (var i = 0; i < answers.length; i++) { if (answers[i] === 1) score++; }
  var pct = Math.round(score / Q.length * 100);
  var msg = pct >= 90 ? 'Výborně! Nástroje vědomé komunikace ovládáte velmi dobře.'
    : pct >= 70 ? 'Dobrý výsledek. Pár technik stojí za bližší prozkoumání.'
    : pct >= 50 ? 'Základ je tu – teorie chce procvičit v praxi.'
    : 'Kvíz je dobrý výchozí bod – technikám vědomé komunikace se ještě věnujte.';

  var bars = '';
  for (var i = 0; i < Q.length; i++) {
    var ok = answers[i] === 1;
    bars += '<div class="bar-row">' +
      '<div class="bar-label" title="' + Q[i].tag + '">' + (i+1) + '. ' + Q[i].tag + '</div>' +
      '<div class="bar-track"><div class="bar-fill ' + (ok ? '' : 'no') + '" style="width:' + (ok ? 100 : 0) + '%"></div></div>' +
      '<div style="font-size:14px;min-width:16px">' + (ok ? '&#10003;' : '&#10007;') + '</div>' +
    '</div>';
  }

  document.getElementById('app').innerHTML =
    '<div class="card result">' +
      '<div class="result-score">' + score + '/' + Q.length + '</div>' +
      '<div class="result-sub">správných odpovědí (' + pct + ' %)</div>' +
      '<div class="result-msg">' + msg + '</div>' +
      '<div class="bars">' + bars + '</div>' +
      '<button class="restart" onclick="restart()">&#8635; Zkusit znovu</button>' +
    '</div>';
}

function restart() {
  cur = 0;
  for (var i = 0; i < Q.length; i++) { answers[i] = null; picks[i] = null; }
  render();
}

render();
</script>
</body>
</html>
