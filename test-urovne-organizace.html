<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test spirální dynamiky firmy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red:#C0392B; --orange:#E67E22; --yellow:#F1C40F; --green:#27AE60; --teal:#1ABC9C;
  --red-l:#fdf0ef; --orange-l:#fef5ec; --yellow-l:#fefde7; --green-l:#eafaf1; --teal-l:#e8faf7;
  --bg:#FAFAF7; --text:#1a1a1a; --muted:#888; --border:#e8e8e2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{text-align:center;padding:48px 24px 36px;background:white;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-80px;left:-80px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(26,188,156,.08) 0%,transparent 70%);pointer-events:none}
header::after{content:'';position:absolute;bottom:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(192,57,43,.08) 0%,transparent 70%);pointer-events:none}
.level-dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px;position:relative;z-index:1}
.level-dot{width:16px;height:16px;border-radius:50%}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3.5vw,2.2rem);font-weight:900;margin-bottom:8px;position:relative;z-index:1}
header p{color:var(--muted);font-size:.9rem;max-width:560px;margin-inline:auto;line-height:1.7;position:relative;z-index:1}

/* PROGRESS */
.progress-bar{height:4px;background:var(--border);position:sticky;top:0;z-index:100}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow),var(--green),var(--teal));transition:width .4s}

main{max-width:760px;margin:0 auto;padding:36px 20px 60px}

/* AREA HEADER */
.area-header{text-align:center;margin-bottom:28px}
.area-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.area-num{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;margin-bottom:4px;color:var(--text)}
.area-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:6px}
.area-desc{font-size:.85rem;color:var(--muted);line-height:1.6}

/* QUESTION */
.question-card{background:white;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1.5px solid var(--border)}
.question-text{font-weight:600;font-size:.95rem;margin-bottom:16px;line-height:1.5}
.question-num{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;background:white}
.option:hover{border-color:#aaa;background:var(--bg)}
.option.selected-red{background:var(--red-l);border-color:var(--red)}
.option.selected-orange{background:var(--orange-l);border-color:var(--orange)}
.option.selected-yellow{background:var(--yellow-l);border-color:#d4ac0d}
.option.selected-green{background:var(--green-l);border-color:var(--green)}
.option.selected-teal{background:var(--teal-l);border-color:var(--teal)}
.option-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.option-text{font-size:.86rem;line-height:1.5}

/* NAV */
.nav{display:flex;gap:12px;justify-content:space-between;margin-top:28px}
.btn-nav{padding:13px 28px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-prev{background:var(--bg);color:var(--muted);border:1.5px solid var(--border)}
.btn-prev:hover{background:#eee}
.btn-next{background:var(--text);color:white}
.btn-next:hover{background:#333;transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.2)}
.btn-next:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}

/* RESULTS */
#results{display:none}
.result-hero{text-align:center;padding:32px 24px;background:white;border-radius:20px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,.07)}
.result-hero h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;margin-bottom:8px}
.result-hero p{color:var(--muted);font-size:.88rem;margin-bottom:20px}

/* OVERALL LEVEL */
.overall-level{border-radius:16px;padding:24px;text-align:center;margin-bottom:24px;border:2px solid}
.overall-pct{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;line-height:1;margin-bottom:4px}
.overall-name{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.overall-desc{font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:14px}
.overall-bar-bg{height:10px;border-radius:5px;background:rgba(0,0,0,.1);overflow:hidden}
.overall-bar-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.34,1,.64,1)}

/* AREA RESULTS */
.area-result{background:white;border-radius:16px;padding:22px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.05);border:1.5px solid var(--border)}
.ar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ar-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700}
.ar-level-badge{font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:20px}
.ar-bar-bg{height:8px;border-radius:4px;background:#f0f0ec;overflow:hidden;margin-bottom:10px}
.ar-bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.34,1,.64,1)}
.ar-recommendation{font-size:.82rem;line-height:1.7;color:var(--text);background:var(--bg);border-radius:10px;padding:12px 14px;border-left:3px solid}
.ar-recommendation strong{display:block;margin-bottom:4px;font-weight:700}

/* LEVEL LEGEND */
.level-legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;justify-content:center}
.ll-item{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:20px}
.ll-dot{width:8px;height:8px;border-radius:50%}

/* PRINT */
@media print{
  .progress-bar,.nav,#quiz,.no-print{display:none!important}
  #results{display:block!important}
  .area-result{box-shadow:none;border:1px solid #eee;page-break-inside:avoid}
  body{background:white}
}
@media(max-width:600px){
  .nav{flex-direction:column}
  .btn-nav{width:100%}
}
</style>
</head>
<body>

<header>
  <div class="level-dots">
    <div class="level-dot" style="background:var(--red)"></div>
    <div class="level-dot" style="background:var(--orange)"></div>
    <div class="level-dot" style="background:var(--yellow)"></div>
    <div class="level-dot" style="background:var(--green)"></div>
    <div class="level-dot" style="background:var(--teal)"></div>
  </div>
  <h1>Test spirální dynamiky firmy</h1>
  <p>Týmový test konceptu Tyrkysových organizací (F. Laloux). Odpovídejte jako tým – vyberte odpověď, která nejlépe popisuje vaši každodenní realitu, nikoliv tu, kterou byste si přáli mít.</p>
</header>

<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<main>
  <div id="quiz"></div>
  <div id="results"></div>
</main>

var answers = {}; // areaId -> [0-4, 0-4, ...]
var currentArea = 0;

AREAS.forEach(function(a){ answers[a.id] = [null,null,null,null,null]; });

function getLevelById(id){ return LEVELS.find(function(l){return l.id===id;}); }

function renderArea(idx) {
  var area = AREAS[idx];
  var pct = Math.round((idx / AREAS.length) * 100);
  document.getElementById('progress').style.width = pct + '%';

  var html = '<div class="area-header">';
  html += '<div class="area-badge" style="background:'+area.color+'20;color:'+area.color+'">Oblast '+(idx+1)+' z '+AREAS.length+'</div>';
  html += '<div class="area-title">'+area.title+'</div>';
  html += '<div class="area-desc">'+area.desc+'</div>';
  html += '</div>';

  area.questions.forEach(function(q, qi){
    var sel = answers[area.id][qi];
    html += '<div class="question-card">';
    html += '<div class="question-num">Otázka '+(qi+1)+' z 5</div>';
    html += '<div class="question-text">'+q.q+'</div>';
    html += '<div class="options">';
    q.opts.forEach(function(opt, oi){
      var level = LEVELS[oi];
      var selCls = sel===oi ? 'selected-'+level.id : '';
      html += '<div class="option '+selCls+'" onclick="selectAnswer(\''+area.id+'\','+qi+','+oi+')">'+
        '<div class="option-dot" style="background:'+level.color+'"></div>'+
        '<div class="option-text">'+opt+'</div>'+
      '</div>';
    });
    html += '</div></div>';
  });

  var allAnswered = answers[area.id].every(function(a){return a!==null;});
  var isLast = idx === AREAS.length - 1;

  html += '<div class="nav">';
  if(idx > 0) html += '<button class="btn-nav btn-prev" onclick="goArea('+(idx-1)+')">← Zpět</button>';
  else html += '<div></div>';
  html += '<button class="btn-nav btn-next" '+(allAnswered?'':'disabled')+' onclick="'+(isLast?'showResults()':'goArea('+(idx+1)+')')+'">'+
    (isLast ? 'Zobrazit výsledky →' : 'Další oblast →')+
  '</button>';
  html += '</div>';

  document.getElementById('quiz').innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectAnswer(areaId, qi, oi) {
  var scrollY = window.scrollY;
  answers[areaId][qi] = oi;
  renderArea(currentArea);
  window.scrollTo(0, scrollY);
}

function goArea(idx) {
  currentArea = idx;
  renderArea(idx);
}

function calcAreaScore(areaId) {
  var ans = answers[areaId];
  var total = ans.reduce(function(s,a){ return s + (a!==null ? LEVELS[a].score : 0); }, 0);
  return total / (5 * 5); // 0-1
}

function getLevelFromScore(score) {
  if(score >= 0.85) return LEVELS[4]; // teal
  if(score >= 0.65) return LEVELS[3]; // green
  if(score >= 0.45) return LEVELS[2]; // yellow
  if(score >= 0.25) return LEVELS[1]; // orange
  return LEVELS[0]; // red
}

function showResults() {
  document.getElementById('progress').style.width = '100%';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  var areaScores = AREAS.map(function(a){ return calcAreaScore(a.id); });
  var avgScore = areaScores.reduce(function(s,x){return s+x;},0) / areaScores.length;
  var overallLevel = getLevelFromScore(avgScore);
  var overallPct = Math.round(avgScore * 100);

  var html = '<div class="result-hero">';
  html += '<h2>Výsledky vaší organizace</h2>';
  html += '<p>Celkové skóre ze všech 6 oblastí – každá oblast může být na jiné úrovni.</p>';

  // Overall block
  html += '<div class="overall-level" style="background:'+overallLevel.bg+';border-color:'+overallLevel.color+'40">';
  html += '<div class="overall-pct" style="color:'+overallLevel.color+'">'+overallPct+'%</div>';
  html += '<div class="overall-name" style="color:'+overallLevel.color+'">'+overallLevel.name+'</div>';
  html += getOverallDesc(overallLevel.id);
  html += '<div class="overall-bar-bg"><div class="overall-bar-fill" id="overall-bar" style="width:0%;background:'+overallLevel.color+'"></div></div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-top:4px"><span>🔴 Červená</span><span>🟠 Jantarová</span><span>🟡 Oranžová</span><span>🟢 Zelená</span><span>🩵 Tyrkysová</span></div>';
  html += '</div>';

  // Level legend
  html += '<div class="level-legend">';
  LEVELS.forEach(function(l){
    html += '<div class="ll-item" style="background:'+l.bg+'"><div class="ll-dot" style="background:'+l.color+'"></div><span style="color:'+l.color+'">'+l.name+'</span></div>';
  });
  html += '</div>';
  html += '</div>';

  // Area results sorted by score (weakest first)
  var areaResults = AREAS.map(function(a, i){ return {area:a, score:areaScores[i]}; });
  areaResults.sort(function(a,b){ return a.score-b.score; });
  // Area overview table
  html += '<div style="margin-bottom:20px">';
  html += '<div style="font-family:\'Playfair Display\',serif;font-size:1rem;font-weight:700;margin-bottom:12px">Přehled úrovní podle oblastí</div>';
  html += '<table style="width:100%;border-collapse:collapse">';
  html += '<thead><tr>';
  html += '<th style="text-align:left;padding:7px 10px;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)">Oblast</th>';
  html += '<th style="text-align:center;padding:7px 6px;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)">Úroveň</th>';
  html += '<th style="padding:7px 6px;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)">Skóre</th>';
  html += '</tr></thead><tbody>';
  AREAS.forEach(function(a, i){
    var sc = areaScores[i];
    var lv = getLevelFromScore(sc);
    var pct = Math.round(sc*100);
    var rowBg = i%2===0?'#fafaf7':'white';
    html += '<tr style="background:'+rowBg+'">';
    html += '<td style="padding:8px 10px;font-size:.84rem;font-weight:600;border-bottom:1px solid #f0f0ec">'+a.title+'</td>';
    html += '<td style="padding:8px 6px;text-align:center;border-bottom:1px solid #f0f0ec"><span style="background:'+lv.bg+';color:'+lv.color+';font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">'+lv.name+'</span></td>';
    html += '<td style="padding:8px 6px;border-bottom:1px solid #f0f0ec">';
    html += '<div style="display:flex;align-items:center;gap:6px">';
    html += '<div style="flex:1;height:6px;border-radius:3px;background:#f0f0ec;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+lv.color+'"></div></div>';
    html += '<span style="font-size:.78rem;font-weight:700;color:'+lv.color+';min-width:32px">'+pct+'%</span>';
    html += '</div></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // Critical zone - weakest areas (score < 0.45 = below orange/yellow)
  var criticalAreas = areaResults.filter(function(ar){ return ar.score < 0.45; });
  if(criticalAreas.length > 0){
    html += '<div style="background:#fff0f1;border-radius:14px;padding:18px 20px;margin-bottom:20px;border:2px solid #E8192C30">';
    html += '<div style="font-family:\'Playfair Display\',serif;font-size:1rem;font-weight:700;color:var(--red);margin-bottom:6px">🚨 Kritická zóna – oblasti vyžadující nejrychlejší transformaci</div>';
    html += '<div style="font-size:.82rem;color:var(--muted);margin-bottom:14px;line-height:1.6">Tyto oblasti jsou na úrovni, která může blokovat rozvoj celé organizace. Firma je jen tak silná, jak silný je její nejslabší článek.</div>';
    criticalAreas.forEach(function(ar){
      var lv = getLevelFromScore(ar.score);
      var rec = ar.area.recs.find(function(r){return r.level===lv.id;});
      html += '<div style="background:white;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid #E8192C20">';
      html += '<div style="font-weight:700;font-size:.86rem;color:var(--red);margin-bottom:4px">'+ar.area.title+'</div>';
      if(rec) html += '<div style="font-size:.8rem;color:var(--text);line-height:1.6">→ '+rec.text+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }


  html += '<div style="font-family:\'Playfair Display\',serif;font-size:1.1rem;font-weight:700;margin-bottom:14px">Výsledky podle oblastí (od nejslabší po nejsilnější)</div>';

  areaResults.forEach(function(ar, i){
    var level = getLevelFromScore(ar.score);
    var pct = Math.round(ar.score * 100);
    var rec = ar.area.recs.find(function(r){return r.level===level.id;});

    html += '<div class="area-result">';
    html += '<div class="ar-header">';
    html += '<div class="ar-title" style="color:'+ar.area.color+'">'+ar.area.title+'</div>';
    html += '<span class="ar-level-badge" style="background:'+level.bg+';color:'+level.color+'">'+level.name+' · '+pct+'%</span>';
    html += '</div>';
    html += '<div class="ar-bar-bg"><div class="ar-bar-fill" data-w="'+pct+'" style="width:0%;background:'+level.color+'"></div></div>';
    if(rec){
      html += '<div class="ar-recommendation" style="border-left-color:'+level.color+'">';
      html += '<strong>🎯 Doporučený krok pro posun:</strong>';
      html += rec.text;
      html += '</div>';
    }
    html += '</div>';
  });

  html += '<div style="text-align:center;margin-top:20px" class="no-print">';
  html += '<button onclick="window.print()" style="background:var(--text);color:white;border:none;padding:12px 28px;border-radius:50px;font-family:\'DM Sans\',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;margin-right:12px">🖨 Vytisknout výsledky</button>';
  html += '<button onclick="location.reload()" style="background:var(--bg);color:var(--muted);border:1.5px solid var(--border);padding:12px 28px;border-radius:50px;font-family:\'DM Sans\',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer">↺ Začít znovu</button>';
  html += '</div>';

  document.getElementById('results').innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});

  requestAnimationFrame(function(){requestAnimationFrame(function(){
    document.getElementById('overall-bar').style.width = overallPct+'%';
    document.querySelectorAll('.ar-bar-fill').forEach(function(b){
      b.style.width = b.dataset.w+'%';
    });
  });});
}

function getOverallDesc(id) {
  var descs = {
    red:    '<div class="overall-desc">Organizace funguje primárně na základě moci a kontroly. Existuje velký potenciál pro posun – první kroky jsou zásadní.</div>',
    orange: '<div class="overall-desc">Organizace má základní struktury a procesy. Je čas zaměřit se na lidi a výsledky, nejen na dodržování pravidel.</div>',
    yellow: '<div class="overall-desc">Organizace funguje efektivně a orientuje se na výsledky. Nyní je čas otevřít se hodnotám, kultuře a zapojení lidí.</div>',
    green:  '<div class="overall-desc">Organizace klade důraz na lidi a hodnoty. Dalším krokem je posílení autonomie a distribuce odpovědnosti.</div>',
    teal:   '<div class="overall-desc">Organizace dosahuje vysoké úrovně sebeřízení a smysluplnosti. Klíčem je udržení a kultivace této kultury.</div>'
  };
  return descs[id] || '';
}

// Start
renderArea(0);
</script>
